# Argo CD Image Updater — watches ACR for new image tags and writes bumps back
# to Git (see the notes Application's annotations). Installed by Argo itself.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: image-updater
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: platform
  source:
    repoURL: https://argoproj.github.io/argo-helm
    chart: argocd-image-updater
    targetRevision: 0.11.0
    helm:
      values: |
        config:
          # ACR registry. Pull creds come from the argocd/acr-helm secret
          # (a scoped ACR token), created out-of-band at bootstrap.
          registries:
            - name: acr
              api_url: https://acrm1devsdc001.azurecr.io
              prefix: acrm1devsdc001.azurecr.io
              credentials: pullsecret:argocd/acr-helm
              ping: yes
        # Identity used for the git write-back commits.
        gitCommitUser: argocd-image-updater
        gitCommitMail: argocd-image-updater@users.noreply.github.com
        resources:
          requests: { cpu: 25m, memory: 64Mi }
          limits: { cpu: 100m, memory: 128Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated: { prune: true, selfHeal: true }
