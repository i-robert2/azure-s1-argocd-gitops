# Cluster add-ons, installed and owned by Argo CD. Sync-wave -2 so they come up
# before the workloads that need them (ingress + TLS). ingress-nginx and
# cert-manager are the same add-ons M1 used, now delivered via GitOps.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-addons-ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: platform
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3
    helm:
      values: |
        controller:
          replicaCount: 1
          service:
            externalTrafficPolicy: Local
          metrics:
            enabled: true
          resources:
            requests: { cpu: 100m, memory: 128Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-addons-cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: platform
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.16.2
    helm:
      values: |
        crds:
          enabled: true
        resources:
          requests: { cpu: 25m, memory: 64Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
---
# The Let's Encrypt ClusterIssuer (raw manifest in this repo). Sync-wave -1 so it
# applies AFTER cert-manager's CRDs exist but BEFORE app ingresses request certs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-addons-clusterissuer
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: platform
  source:
    repoURL: https://github.com/i-robert2/azure-s1-argocd-gitops.git
    path: platform/addons
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    # cert-manager CRDs may not be established on the very first pass — retry.
    retry:
      limit: 5
      backoff: { duration: 15s, factor: 2, maxDuration: 3m }
