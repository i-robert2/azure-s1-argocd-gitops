# The notes app, delivered from an OCI Helm chart in ACR. Argo CD Image Updater
# watches the two images and, on a new tag, writes the bump to a separate branch
# (image-updater) so it lands as a reviewable PR into main (which Argo watches).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: notes
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    # --- Argo CD Image Updater ---
    argocd-image-updater.argoproj.io/image-list: >-
      api=acrm1devsdc001.azurecr.io/notes-api,
      frontend=acrm1devsdc001.azurecr.io/notes-frontend
    argocd-image-updater.argoproj.io/api.update-strategy: semver
    argocd-image-updater.argoproj.io/frontend.update-strategy: semver
    argocd-image-updater.argoproj.io/api.allow-tags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
    argocd-image-updater.argoproj.io/frontend.allow-tags: "regexp:^[0-9]+\\.[0-9]+\\.[0-9]+$"
    argocd-image-updater.argoproj.io/api.helm.image-tag: api.tag
    argocd-image-updater.argoproj.io/frontend.helm.image-tag: frontend.tag
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
    argocd-image-updater.argoproj.io/git-repository: git@github.com:i-robert2/azure-s1-argocd-gitops.git
    argocd-image-updater.argoproj.io/write-back-target: helmvalues:./platform/apps/notes/values.yaml
    # base:write branch -> commits land on image-updater, PR'd into main (Argo watches main)
    argocd-image-updater.argoproj.io/git-branch: main:image-updater
spec:
  project: platform
  sources:
    - repoURL: acrm1devsdc001.azurecr.io/charts
      chart: notes
      targetRevision: 0.1.0
      helm:
        valueFiles:
          - $values/platform/apps/notes/values.yaml
    - repoURL: https://github.com/i-robert2/azure-s1-argocd-gitops.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
