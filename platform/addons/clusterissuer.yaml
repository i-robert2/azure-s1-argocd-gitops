# Let's Encrypt production ClusterIssuer (HTTP-01 via ingress-nginx). Managed by
# Argo (cluster-addons-clusterissuer app). Same issuer M1/M3/M4 used for TLS.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: i-robert2@users.noreply.github.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
